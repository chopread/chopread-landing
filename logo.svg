<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64" role="img" aria-label="ChopRead">
  <rect x="2" y="2" width="60" height="60" rx="15" fill="#0E1213" stroke="#2A2118" stroke-width="1.5"/>
  <!-- the read-level: a horizontal level slicing through the chop -->
  <line x1="10" y1="34" x2="54" y2="34" stroke="#C2790A" stroke-width="1.4" stroke-dasharray="3 3" opacity="0.5"/>
  <!-- the chop: a jagged, ascending price line -->
  <path d="M12 46 L22 42 L28 45 L36 36 L42 39 L52 18" fill="none" stroke="url(#cl)" stroke-width="4.2" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- the snipe: dot at the breakout -->
  <circle cx="52" cy="18" r="7" fill="#C2790A" opacity="0.22"/>
  <circle cx="52" cy="18" r="3.6" fill="#E0A92A"/>
  <defs>
    <linearGradient id="cl" x1="12" y1="46" x2="52" y2="18" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#9A5E08"/><stop offset="1" stop-color="#E0A92A"/>
    </linearGradient>
  </defs>
</svg>
