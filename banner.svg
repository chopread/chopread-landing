<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630" role="img" aria-label="ChopRead — sift through the chop">
  <defs>
    <radialGradient id="glow" cx="82%" cy="18%" r="60%">
      <stop offset="0" stop-color="#C2790A" stop-opacity="0.20"/>
      <stop offset="1" stop-color="#C2790A" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="line" x1="0" y1="0" x2="1200" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#9A5E08"/><stop offset="1" stop-color="#E0A92A"/>
    </linearGradient>
    <linearGradient id="mk" x1="0" y1="64" x2="64" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#9A5E08"/><stop offset="1" stop-color="#E0A92A"/>
    </linearGradient>
    <pattern id="grid" width="48" height="48" patternUnits="userSpaceOnUse">
      <path d="M48 0 L0 0 0 48" fill="none" stroke="#1C2A28" stroke-opacity="0.35" stroke-width="1"/>
    </pattern>
  </defs>

  <!-- background -->
  <rect width="1200" height="630" fill="#0E1213"/>
  <rect width="1200" height="630" fill="url(#grid)"/>
  <rect width="1200" height="630" fill="url(#glow)"/>

  <!-- faint choppy price motif across the lower third -->
  <path d="M0 470 L120 452 L210 478 L320 430 L430 452 L540 392 L660 418 L770 350 L900 384 L1030 300 L1130 332 L1200 286"
        fill="none" stroke="#C2790A" stroke-opacity="0.14" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- the read-level slicing through -->
  <line x1="0" y1="392" x2="1200" y2="392" stroke="#C2790A" stroke-opacity="0.10" stroke-width="1.5" stroke-dasharray="6 6"/>

  <!-- mark -->
  <g transform="translate(96,228) scale(1.7)">
    <rect x="2" y="2" width="60" height="60" rx="15" fill="#0E1213" stroke="#2A2118" stroke-width="1.5"/>
    <line x1="10" y1="34" x2="54" y2="34" stroke="#C2790A" stroke-width="1.4" stroke-dasharray="3 3" opacity="0.5"/>
    <path d="M12 46 L22 42 L28 45 L36 36 L42 39 L52 18" fill="none" stroke="url(#mk)" stroke-width="4.2" stroke-linecap="round" stroke-linejoin="round"/>
    <circle cx="52" cy="18" r="7" fill="#C2790A" opacity="0.22"/>
    <circle cx="52" cy="18" r="3.6" fill="#E0A92A"/>
  </g>

  <!-- wordmark -->
  <text x="248" y="300" font-family="Fraunces, Georgia, 'DejaVu Serif', serif" font-size="92" font-weight="700" letter-spacing="0.5" fill="#E8E8E2">Chop<tspan fill="#C2790A">Read</tspan></text>
  <text x="252" y="350" font-family="'IBM Plex Mono', ui-monospace, 'DejaVu Sans Mono', monospace" font-size="22" letter-spacing="7" fill="#C2790A">SIFT THROUGH THE CHOP</text>

  <!-- value line -->
  <text x="250" y="430" font-family="-apple-system, 'Helvetica Neue', 'DejaVu Sans', sans-serif" font-size="26" fill="#9FB0A8">Read the dealer flow · Dodge the traps · Catch the move</text>

  <!-- footer -->
  <text x="96" y="600" font-family="'IBM Plex Mono', ui-monospace, 'DejaVu Sans Mono', monospace" font-size="18" letter-spacing="2" fill="#C2790A">chopread.com</text>
  <text x="1104" y="600" text-anchor="end" font-family="'IBM Plex Mono', ui-monospace, 'DejaVu Sans Mono', monospace" font-size="14" letter-spacing="1" fill="#5B6A64">Educational tools · not financial advice</text>
</svg>
